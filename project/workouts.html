<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Home workouts options and tools">
    <meta name="author" content="Karee Graf">

    <title>Workouts</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/main.js" defer></script>

</head>
<body>
    <header>
        <h1>Workout Generator</h1>
        <nav class="navigation">
            <a href="index.html">Home</a>
            <a href="workouts.html">Workouts</a>
            <a href="tracker.html">Tracker</a>
        </nav>
    </header>
    
    <main>
        <h2>Select Workout Type</h2>

        <select id="category">
            <option value="choose-category">Choose Category</option>
            <option value="upper">Upper Body</option>
            <option value="lower">Lower Body</option>
            <option value="full">Full Body</option>
            <option value="cardio">Cardio</option>
            <option value="hiit">HIIT</option>
            <option value="warmup">Warm Up</option>
            <option value="cooldown">Cool Down</option>
            <option value="pilates">Pilates</option>
            <option value="no-weights">No Weights</option>
            <option value="kettlebell">Kettlebell</option>

        </select>
        <button id="generate">Generate Workout</button> 

        <div id="output"></div>

        <h3>Workout Timer</h3>
        <button id="startTimer">Start Timer</button>
        <p id="timer">Ready</p>
    </main>

    <footer>
        <p> ©<span id="currentyear"></span> Everyday Strong</p>
        <p id="lastModified"></p>
    </footer>

</body>
</html>
